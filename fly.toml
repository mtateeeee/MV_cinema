app = "mv-cinema"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[[services]]
  internal_port = 8081
  protocol = "tcp"

  # Prevent Fly from stopping the app due to inactivity.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/actuator/health"
