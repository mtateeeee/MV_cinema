<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="'Duyệt • ' + ${listSlug} + ' • MV CINEMA'">Duyệt</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/assets/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments :: loadingOverlay}"></div>
<div th:replace="~{fragments :: navbar}"></div>

<main class="container my-4">
  <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
    <h1 class="h5 mb-0 section-title" th:text="'Duyệt: ' + ${listSlug}"></h1>
    <a class="btn btn-sm btn-outline-secondary" th:href="@{|/browse/${listSlug}|}">Đặt lại</a>
  </div>

  <form class="card card-body mt-3" style="background: rgba(24,24,24,0.85);" method="get" th:action="@{|/browse/${listSlug}|}">
    <div class="row g-2 align-items-end">
      <div class="col-12 col-md-3">
        <label class="form-label">Thể loại</label>
        <select class="form-select" name="genre">
          <option value="">Tất cả</option>
          <option th:each="g : ${genres}" th:value="${g.slug}" th:text="${g.name}" th:selected="${filters.genre == g.slug}"></option>
        </select>
      </div>
      <div class="col-12 col-md-3">
        <label class="form-label">Quốc gia</label>
        <select class="form-select" name="country">
          <option value="">Tất cả</option>
          <option th:each="c : ${countries}" th:value="${c.slug}" th:text="${c.name}" th:selected="${filters.country == c.slug}"></option>
        </select>
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">Năm</label>
        <input class="form-control" name="year" placeholder="2025" th:value="${filters.year}">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">Loại</label>
        <select class="form-select" name="type">
          <option value="">Bất kỳ</option>
          <option value="single" th:selected="${filters.type == 'single'}">Phim lẻ</option>
          <option value="series" th:selected="${filters.type == 'series'}">Phim bộ</option>
          <option value="hoathinh" th:selected="${filters.type == 'hoathinh'}">Hoạt hình</option>
        </select>
      </div>
      <div class="col-6 col-md-1">
        <label class="form-label">Sắp xếp</label>
        <select class="form-select" name="sortType">
          <option value="desc" th:selected="${filters.sortType == 'desc'}">Giảm dần</option>
          <option value="asc" th:selected="${filters.sortType == 'asc'}">Tăng dần</option>
        </select>
      </div>
      <div class="col-6 col-md-1">
        <button class="btn btn-primary w-100" type="submit">Áp dụng</button>
      </div>
    </div>
  </form>

  <div class="row movie-grid row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-6 g-3 mt-2">
    <div class="col d-flex" th:each="it : ${resp.items}">
      <div class="w-100" th:replace="~{fragments :: movieCard(${it})}"></div>
    </div>
  </div>

  <nav class="mt-4" aria-label="pagination" th:if="${resp.pagination.totalPages > 1}">
    <ul class="pagination">
      <li class="page-item" th:classappend="${resp.pagination.currentPage == 1} ? 'disabled'">
        <a class="page-link"
           th:href="@{|/browse/${listSlug}|(page=${resp.pagination.currentPage - 1},genre=${filters.genre},country=${filters.country},year=${filters.year},type=${filters.type},sortField=${filters.sortField},sortType=${filters.sortType})}">Trước</a>
      </li>
      <li class="page-item disabled">
        <span class="page-link">
          Trang <span th:text="${resp.pagination.currentPage}"></span>/<span th:text="${resp.pagination.totalPages}"></span>
        </span>
      </li>
      <li class="page-item" th:classappend="${resp.pagination.currentPage == resp.pagination.totalPages} ? 'disabled'">
        <a class="page-link"
           th:href="@{|/browse/${listSlug}|(page=${resp.pagination.currentPage + 1},genre=${filters.genre},country=${filters.country},year=${filters.year},type=${filters.type},sortField=${filters.sortField},sortType=${filters.sortType})}">Sau</a>
      </li>
    </ul>
  </nav>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
<script>
(function () {
  var overlay = document.getElementById('loadingOverlay');
  if (!overlay) return;
  window.addEventListener('load', function () { overlay.classList.add('hidden'); });
})();
</script>
