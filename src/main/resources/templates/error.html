<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${title} + ' • MV CINEMA'">Error</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/assets/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments :: loadingOverlay}"></div>
<div th:replace="~{fragments :: navbar}"></div>

<main class="container my-5">
  <div class="card shadow-sm">
    <div class="card-body">
      <h1 class="h4" th:text="${title}">Error</h1>
      <p class="text-secondary mb-3" th:text="${message}">Something went wrong.</p>
      <div class="d-flex gap-2">
        <a class="btn btn-primary" th:href="@{/}">Go home</a>
        <a class="btn btn-outline-secondary" href="javascript:history.back()">Go back</a>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
<script>
(function () {
  var overlay = document.getElementById('loadingOverlay');
  if (!overlay) return;
  window.addEventListener('load', function () { overlay.classList.add('hidden'); });
})();
</script>
