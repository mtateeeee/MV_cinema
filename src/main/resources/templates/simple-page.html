<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${title} + ' • MV CINEMA'">Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/assets/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments :: loadingOverlay}"></div>
<div th:replace="~{fragments :: navbar}"></div>

<main class="container my-5">
  <div class="card shadow-sm p-4 simple-page-card" style="background: rgba(24,24,24,0.85);">
    <h1 class="h5 section-title mb-2" th:text="${title}">Title</h1>
    <div style="color: rgba(255,255,255,0.75);" th:text="${message}">Message</div>
    <div class="mt-3">
      <a class="btn btn-primary" th:href="@{/}">Home</a>
    </div>
  </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
<script>
(function () {
  var overlay = document.getElementById('loadingOverlay');
  if (!overlay) return;
  window.addEventListener('load', function () { overlay.classList.add('hidden'); });
})();
</script>
