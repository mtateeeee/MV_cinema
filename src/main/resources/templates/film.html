<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${resp.movie.name} + ' • MV CINEMA'">Film</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/assets/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments :: loadingOverlay}"></div>
<div th:replace="~{fragments :: navbar}"></div>

<main class="container my-4" th:if="${resp != null && resp.movie != null}" th:with="posterUrl=${posterUrl != null ? posterUrl : ''}">
  <div class="row g-4">
    <div class="col-12 col-md-4 col-lg-3" th:with="placeholderImg=@{/assets/placeholder-poster.svg}">
      <div class="ratio ratio-2x3 rounded overflow-hidden border shadow-sm film-poster position-relative"
           style="border-color: var(--border) !important; background: var(--panel-2); min-height: 200px;">
        <div class="position-absolute top-0 start-0 w-100 h-100">
          <img class="film-poster-img" style="width:100%;height:100%;object-fit:cover;display:block;"
               th:src="${posterUrl != null && !posterUrl.isBlank() ? posterUrl : placeholderImg}"
               th:alt="${resp.movie.name}"
               onerror="this.onerror=null; var fb=this.getAttribute('data-fallback'); if(fb) this.src=fb;"
               th:attr="data-fallback=${placeholderImg}">
        </div>
      </div>
    </div>
    <div class="col-12 col-md-8 col-lg-9">
      <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
        <div>
          <div class="d-flex align-items-center flex-wrap gap-2">
            <h1 class="h3 mb-1 section-title" th:text="${resp.movie.name}"></h1>
            <span class="coming-soon-pill"
                  th:if="${(resp.movie.episode_current != null and #strings.containsIgnoreCase(resp.movie.episode_current,'trailer')) or (resp.episodes == null or resp.episodes.isEmpty())}">
              COMING SOON
            </span>
          </div>
          <div style="color: var(--muted);" th:text="${resp.movie.origin_name}"></div>
          <div class="rating-row mt-2" th:if="${rating10 != null && rating10 > 0}">
            <div class="rating-stars" aria-label="Rating">
              <span th:each="i : ${#numbers.sequence(1,5)}">
                <svg class="star" viewBox="0 0 24 24" aria-hidden="true"
                     th:classappend="${i <= ratingStars} ? ' star-full' : ' star-empty'">
                  <path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                </svg>
              </span>
            </div>
            <div class="small ms-2" style="color: rgba(255,255,255,0.72);">
              <span th:text="${#numbers.formatDecimal(rating10,1,1)}"></span><span>/10</span>
            </div>
          </div>
        </div>
        <div class="d-flex gap-2">
          <a class="btn btn-primary" th:href="@{|/watch/${resp.movie.slug}|}">Watch</a>
          <a class="btn btn-outline-secondary trailer-btn"
             th:classappend="${resp.movie.trailer_url == null || resp.movie.trailer_url.isBlank()} ? 'trailer-btn-hidden' : ''"
             th:href="${(resp.movie.trailer_url != null && !resp.movie.trailer_url.isBlank()) ? resp.movie.trailer_url : '#'}"
             th:attr="target=${resp.movie.trailer_url != null && !resp.movie.trailer_url.isBlank()} ? '_blank' : null, rel=${resp.movie.trailer_url != null && !resp.movie.trailer_url.isBlank()} ? 'noreferrer' : null">Trailer</a>
        </div>
      </div>

      <div class="mt-3 d-flex flex-wrap gap-2">
        <span class="badge text-bg-dark" th:text="${resp.movie.year}"></span>
        <span class="badge text-bg-secondary" th:text="${resp.movie.quality}"></span>
        <span class="badge text-bg-secondary" th:text="${resp.movie.lang}"></span>
        <span class="badge text-bg-secondary" th:text="${resp.movie.time}"></span>
        <span class="badge text-bg-secondary" th:text="'Ep: ' + ${resp.movie.episode_current}"></span>
      </div>

      <div class="mt-3" th:if="${resp.movie.category != null}">
        <div class="small" style="color: rgba(255,255,255,0.55);">Genres</div>
        <div class="d-flex flex-wrap gap-2 mt-1">
          <a class="badge rounded-pill border text-decoration-none"
             style="background: rgba(255,255,255,0.06); color: var(--text);"
             th:each="g : ${resp.movie.category}"
             th:href="@{/browse/phim-moi-cap-nhat(genre=${g.slug})}"
             th:text="${g.name}"></a>
        </div>
      </div>

      <div class="mt-3">
        <div class="small" style="color: rgba(255,255,255,0.55);">Overview</div>
        <div class="mt-1" style="color: rgba(255,255,255,0.82);" th:utext="${resp.movie.content}"></div>
      </div>

      <div class="mt-4" th:if="${resp.episodes != null && !resp.episodes.isEmpty()}">
        <h2 class="h5">Episodes</h2>
        <div class="accordion" id="servers">
          <div class="accordion-item" th:each="s, idx : ${resp.episodes}">
            <h2 class="accordion-header">
              <button class="accordion-button" type="button" data-bs-toggle="collapse"
                      th:attr="data-bs-target='#server-' + ${idx.index},aria-controls='server-' + ${idx.index}"
                      th:classappend="${idx.index == 0} ? '' : ' collapsed'">
                <span th:text="${s.server_name}"></span>
              </button>
            </h2>
            <div class="accordion-collapse collapse" th:id="'server-' + ${idx.index}" th:classappend="${idx.index == 0} ? ' show' : ''" data-bs-parent="#servers">
              <div class="accordion-body">
                <div class="d-flex flex-wrap gap-2">
                  <a class="btn btn-sm btn-outline-primary"
                     th:each="e : ${s.server_data}"
                     th:text="${e.name}"
                     th:href="@{|/watch/${resp.movie.slug}|(server=${idx.index},ep=${e.slug})}"></a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="alert mt-4"
           th:if="${resp.episodes == null || resp.episodes.isEmpty()}">
        <div class="fw-semibold" style="letter-spacing:.6px; text-transform:uppercase;">Coming Soon</div>
        <div class="small" style="color: rgba(255,255,255,0.72);">This title doesn’t have playable episodes yet.</div>
      </div>
    </div>
  </div>

  <section class="similar-section mt-5 pt-4 border-top" th:if="${similarMovies != null && !similarMovies.isEmpty()}">
    <h2 class="h5 section-title mb-3">CÓ THỂ BẠN SẼ THÍCH</h2>
    <div class="similar-marquee">
      <div class="similar-marquee-inner">
        <div class="similar-card-wrap flex-shrink-0" th:each="it : ${similarMovies}">
          <div class="similar-card" th:replace="~{fragments :: movieCard(${it})}"></div>
        </div>
        <div class="similar-card-wrap flex-shrink-0" th:each="it : ${similarMovies}">
          <div class="similar-card" th:replace="~{fragments :: movieCard(${it})}"></div>
        </div>
      </div>
    </div>
  </section>
</main>

<main class="container my-5" th:if="${resp == null || resp.movie == null}">
  <div class="alert alert-warning">Movie not found.</div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
<script>
(function () {
  var overlay = document.getElementById('loadingOverlay');
  if (!overlay) return;
  window.addEventListener('load', function () { overlay.classList.add('hidden'); });
})();
</script>
