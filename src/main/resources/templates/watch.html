<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="'Watch • ' + ${resp.movie.name} + ' • MV CINEMA'">Watch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/assets/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments :: loadingOverlay}"></div>
<div th:replace="~{fragments :: navbar}"></div>

<main class="container my-4" th:if="${resp != null && resp.movie != null}">
  <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
    <div>
      <h1 class="h5 mb-0 section-title" th:text="${resp.movie.name}"></h1>
      <div class="small" style="color: var(--muted);" th:text="${resp.movie.origin_name}"></div>
    </div>
    <a class="btn btn-sm btn-outline-secondary" th:href="@{|/film/${resp.movie.slug}|}">Details</a>
  </div>

  <div class="mt-3 ratio ratio-16x9 rounded overflow-hidden shadow-sm border position-relative" style="background: #000; border-color: var(--border) !important;">
    <video id="player" class="w-100 h-100" controls playsinline></video>
    <div class="player-overlay"
         th:if="${selected == null || (resp.movie.episode_current != null && #strings.containsIgnoreCase(resp.movie.episode_current,'trailer'))}">
      <div class="coming-soon-overlay-block">
        <div class="coming-soon-center">COMING SOON</div>
        <div class="small mt-2" style="color: rgba(255,255,255,0.72);">No playable stream available yet.</div>
      </div>
    </div>
  </div>

  <div class="mt-2 small" style="color: rgba(255,255,255,0.65);" th:if="${selected != null}">
    Playing: <span class="fw-semibold" th:text="${selected.name}"></span>
  </div>

  <div class="alert mt-3" th:if="${selected == null}">
    <div class="fw-semibold" style="letter-spacing:.6px; text-transform:uppercase;">Coming Soon</div>
    <div class="small" style="color: rgba(255,255,255,0.72);">No playable stream is available for this title yet.</div>
  </div>

  <div class="mt-4" th:if="${resp.episodes != null && !resp.episodes.isEmpty()}">
    <h2 class="h6">Servers & Episodes</h2>
    <div class="accordion" id="servers">
      <div class="accordion-item" th:each="s, idx : ${resp.episodes}">
        <h2 class="accordion-header">
          <button class="accordion-button" type="button" data-bs-toggle="collapse"
                  th:attr="data-bs-target='#server-' + ${idx.index},aria-controls='server-' + ${idx.index}"
                  th:classappend="${idx.index == serverIndex} ? '' : ' collapsed'">
            <span th:text="${s.server_name}"></span>
          </button>
        </h2>
        <div class="accordion-collapse collapse" th:id="'server-' + ${idx.index}"
             th:classappend="${idx.index == serverIndex} ? ' show' : ''"
             data-bs-parent="#servers">
          <div class="accordion-body">
            <div class="d-flex flex-wrap gap-2">
              <a class="btn btn-sm"
                 th:classappend="${selected != null && (e.slug == selected.slug || e.name == selected.name)} ? ' btn-primary' : ' btn-outline-primary'"
                 th:each="e : ${s.server_data}"
                 th:text="${e.name}"
                 th:href="@{|/watch/${resp.movie.slug}|(server=${idx.index},ep=${e.slug})}"></a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18/dist/hls.min.js"></script>
<script th:inline="javascript">
  const source = /*[[${selected != null ? selected.link_m3u8 : ''}]]*/ '';
  const video = document.getElementById('player');
  if (source && video) {
    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(source);
      hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = source;
    }
  }
</script>
</body>
</html>
<script>
(function () {
  var overlay = document.getElementById('loadingOverlay');
  if (!overlay) return;
  window.addEventListener('load', function () { overlay.classList.add('hidden'); });
})();
</script>
